<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家居資訊板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1024px; height: 600px; overflow: hidden;
  background: #f5f0e3;
  font-family: -apple-system, "Helvetica Neue", "Noto Sans HK", Arial, sans-serif;
  color: #3a2a1a;
}
.bg-deco {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.banana {
  position: absolute; top: 20px; right: 20px; font-size: 48px;
  opacity: 0.12; transform: rotate(20deg);
}
.glasses {
  position: absolute; bottom: 30px; left: 30px; font-size: 56px;
  opacity: 0.08; transform: rotate(-10deg);
}
.layout {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 140px 1fr;
  width: 1024px; height: 600px;
}

/* ─── TOP BAR (spans full width via wrapper) ─── */
.top-bar {
  grid-column: 1 / -1;
  display: flex; align-items: center;
  padding: 18px 24px 14px;
  border-bottom: 1.5px solid #e0d8c8;
  gap: 0;
}
.clock-block { display: flex; align-items: baseline; gap: 14px; }
.clock-time {
  font-size: 58px; font-weight: 700; color: #2c1a0e; line-height: 1;
  letter-spacing: -2px;
}
.clock-date-block { display: flex; flex-direction: column; justify-content: center; }
.clock-year { font-size: 13px; color: #a08060; font-weight: 400; }
.clock-weekday { font-size: 17px; color: #7a5030; font-weight: 500; margin-top: 2px; }
.divider { width: 1.5px; height: 60px; background: #d8cdb8; margin: 0 24px; flex-shrink:0; }
.weather-block { display: flex; align-items: center; gap: 10px; }
.wx-icon { font-size: 40px; line-height: 1; }
.wx-temp { font-size: 38px; font-weight: 700; color: #2c1a0e; line-height: 1; }
.wx-detail { font-size: 13px; color: #a08060; margin-top: 3px; }

/* ─── LEFT: Bus ─── */
.bus-panel {
  grid-column: 1; grid-row: 2;
  padding: 14px 16px 10px;
  border-right: 1.5px solid #e0d8c8;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-label {
  font-size: 11px; color: #c09060; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 10px; font-weight: 500;
}
.route-block { margin-bottom: 6px; }
.route-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

/* KMB circular badge */
.kmb-badge {
  width: 44px; height: 44px; border-radius: 50%;
  background: #cc2222; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.kmb-top { font-size: 6px; font-weight: 800; color: #fff; letter-spacing: 0.5px; margin-bottom: 1px; }
.kmb-num { font-size: 11px; font-weight: 900; color: #fff; line-height: 1; }
.kmb-bot { font-size: 5px; font-weight: 700; color: #fff; letter-spacing: 0.3px; margin-top: 1px; }

.route-text { flex: 1; }
.route-dest { font-size: 13px; font-weight: 600; color: #3a2a1a; }
.route-stop { font-size: 11px; color: #a08060; margin-top: 1px; }

.eta-rows { display: flex; flex-direction: column; gap: 3px; }
.eta-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.55); border-radius: 6px;
  padding: 3px 8px; border: 0.5px solid #e8dfc8;
}
.eta-seq { font-size: 10px; color: #c0a880; width: 12px; flex-shrink: 0; }
.eta-rmk { font-size: 10px; color: #b09070; flex: 1; }
.eta-right { text-align: right; }
.eta-min { font-size: 16px; font-weight: 700; color: #2c1a0e; line-height: 1; }
.eta-min.arriving { font-size: 12px; color: #cc2222; font-weight: 600; }
.eta-min.soon { color: #d07010; }
.eta-unit { font-size: 10px; color: #a08060; font-weight: 400; }
.eta-abs { font-size: 10px; color: #b09070; }
.no-eta { font-size: 12px; color: #b09070; padding: 6px 0; }

.bus-sep { flex: 1; }
.bus-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid #e0d8c8; margin-top: 6px;
}
.bus-status { display: flex; align-items: center; gap: 5px; }
.s-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9a40; flex-shrink:0; }
.s-dot.err { background: #cc3322; }
.s-txt { font-size: 11px; color: #b09070; }
.refresh-btn {
  background: #f0e8d0; border: 1px solid #d8c8a8; color: #7a5030;
  font-size: 11px; padding: 4px 12px; border-radius: 20px; cursor: pointer;
  font-weight: 500;
}
.refresh-btn:hover { background: #e8dcc0; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── RIGHT: Dinner Calendar ─── */
.dinner-panel {
  grid-column: 2; grid-row: 2;
  padding: 14px 18px 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.dinner-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; flex-shrink: 0;
}
.dinner-title { font-size: 15px; font-weight: 600; color: #3a2a1a; }
.week-nav { display: flex; align-items: center; gap: 6px; }
.week-lbl { font-size: 11px; color: #a08060; min-width: 80px; text-align: center; }
.wk-btn {
  background: #f0e8d0; border: 1px solid #d8c8a8; color: #7a5030;
  font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; font-weight: 500;
}
.wk-btn:hover { background: #e8dcc0; }

.cal-table { width: 100%; border-collapse: collapse; flex: 1; table-layout: fixed; }
.cal-table th {
  font-size: 11px; color: #a08060; font-weight: 500;
  padding: 4px 2px 6px; text-align: center;
  border-bottom: 1.5px solid #e0d8c8;
}
.cal-table th.today-h { color: #c07020; font-weight: 700; }
.cal-table td { padding: 4px 3px; text-align: center; border-bottom: 0.5px solid #ece4d4; }
.cal-table tr:last-child td { border-bottom: none; }

.avatar-cell { padding: 4px 2px; text-align: center; }
.avatar-wrap { display: flex; align-items: center; justify-content: center; }
.avatar-img {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; border: 2px solid #e0d8c8; flex-shrink: 0;
}

.tick-btn {
  width: 100%; height: 36px; border-radius: 10px;
  border: 1.5px solid #b8e8c8; background: #d4f4e0;
  cursor: pointer; font-size: 16px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  color: #2a8a50; transition: transform 0.08s;
}
.tick-btn:active { transform: scale(0.93); }
.tick-btn.no { background: #fde8e0; border-color: #f0b8a8; color: #cc4422; }

.today-td { background: rgba(200,160,60,0.08); }

.summary-row {
  display: flex; gap: 5px; margin-top: 8px; flex-shrink: 0; flex-wrap: wrap;
}
.sum-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid #ddd4c0; color: #a08060; background: rgba(255,255,255,0.5);
}
.sum-chip.has { background: #d4f4e0; border-color: #90d4a8; color: #2a7040; }
.sum-chip.today-chip { background: #fde8c0; border-color: #e0b060; color: #8a5010; font-weight: 600; }
</style>
</head>

<div class="layout">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="clock-block">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date-block">
        <div class="clock-year" id="clockYear"></div>
        <div class="clock-weekday" id="clockWeekday"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="weather-block">
      <div class="wx-icon" id="wxIcon">⛅</div>
      <div>
        <div class="wx-temp" id="wxTemp">--°C</div>
        <div class="wx-detail" id="wxDetail">載入中...</div>
      </div>
      <div style="width:1.5px;height:44px;background:#d8cdb8;margin:0 20px;flex-shrink:0"></div>
      <div class="wx-icon">🔑</div>
      <div>
        <div class="wx-temp">7219</div>
        <div class="wx-detail">大門密碼</div>
      </div>
    </div>
  </div>

  <!-- BUS PANEL -->
  <div class="bus-panel">
    <div id="busContent"></div>
    <div class="bus-sep"></div>
    <div class="bus-footer">
      <div class="bus-status">
        <div class="s-dot" id="sDot"></div>
        <div class="s-txt" id="sTxt">載入中...</div>
      </div>
      <button class="refresh-btn" onclick="fetchBus()"><span id="busIcon">↻</span> 更新</button>
    </div>
  </div>

  <!-- DINNER PANEL -->
  <div class="dinner-panel">
    <div class="dinner-header">

      <div class="week-nav">
        <button class="wk-btn" onclick="changeWeek(-1)">‹ 上週</button>
        <div class="week-lbl" id="weekLbl"></div>
        <button class="wk-btn" onclick="changeWeek(1)">下週 ›</button>
      </div>
    </div>
    <div id="dinnerContent" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div>
  </div>
</div>

  { route:'40',   stype:'1', stop:'LT972', dest:'荃灣（麗城花園）', stopName:'麗港城總站' },
  { route:'219X', stype:'1', stop:'LT545', dest:'尖沙咀（循環線）',  stopName:'麗港中心' },
  { route:'33',   stype:'1', stop:'LT421', dest:'荃灣西站',          stopName:'麗港公園' },
  { route:'W2',   stype:'1', stop:'LT421', dest:'高鐵（西九龍站）',  stopName:'麗港公園' },
];
const WEEKDAY_ZH = ['週日','週一','週二','週三','週四','週五','週六'];
const WEEKDAY_FULL = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

let dinnerData = {};
let weekOffset = 0;
let busCountdown = 30;
let busTimer = null;

function today0() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function dateKey(d) { return d.toISOString().slice(0,10); }
function fmt(d) { return `${d.getMonth()+1}/${d.getDate()}`; }

function getWeekdays(offset) {
  const base = today0();
  const dow = base.getDay();
  const mon = new Date(base);
  mon.setDate(base.getDate() - (dow===0?6:dow-1) + offset*7);
  // Mon–Fri only
  return Array.from({length:5}, (_,i) => {
    const x = new Date(mon); x.setDate(mon.getDate()+i); return x;
  });
}

function ensureDefaults(days) {
  days.forEach(d => {
    const k = dateKey(d);
    if (!dinnerData[k]) dinnerData[k] = {};
    MEMBERS.forEach(m => {
      if (dinnerData[k][m.name] === undefined) dinnerData[k][m.name] = 'yes';
    });
  });
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clockYear').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('clockWeekday').textContent = WEEKDAY_FULL[now.getDay()];
}

// Weather
const WX_MAP = {50:'☀️',51:'🌤',52:'⛅',53:'🌦',54:'🌧',60:'☁️',61:'🌧',62:'⛈',63:'⛈',64:'🌩',65:'🌧',70:'☁️',71:'☀️',72:'🌤',73:'⛅',74:'🌦',75:'🌧',76:'🌩',77:'⛈',80:'🌫'};
async function fetchWeather() {
  try {
    const curr = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r=>r.json());
    const temps = curr.temperature?.data || [];
    // Priority: 藍田 → 觀塘 → 秀茂坪 → 香港天文台 → first available
    const station = temps.find(t=>t.place==='藍田')
      || temps.find(t=>t.place==='觀塘')
      || temps.find(t=>t.place==='秀茂坪')
      || temps.find(t=>t.place==='香港天文台')
      || temps[0];
    const temp = station ? Math.round(station.value) : '--';
    const place = station ? station.place : '';
    const humids = curr.humidity?.data || [];
    const humidStation = humids.find(h=>h.place==='藍田') || humids.find(h=>h.place==='觀塘') || humids[0];
    const humid = humidStation?.value ? Math.round(humidStation.value) : '--';
    const icon = WX_MAP[curr.icon?.[0]] || '🌡';
    document.getElementById('wxIcon').textContent = icon;
    document.getElementById('wxTemp').textContent = `${temp}°C`;
    document.getElementById('wxDetail').textContent = `${place}　濕度 ${humid}%`;
  } catch(e) {
    document.getElementById('wxDetail').textContent = '天氣資料暫時不可用';
  }
}

// Bus
async function fetchBus() {
  const icon = document.getElementById('busIcon');
  icon.classList.add('spin');
  clearInterval(busTimer);
  busCountdown = 30;

  const isFileProtocol = location.protocol === 'file:';

  const results = await Promise.allSettled(BUS_ROUTES.map(r =>
    fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${r.stop}`, {
      headers: { 'Accept': 'application/json' }
    })
      .then(res => { if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
      .then(j => (j.data||[]).filter(e => e.route===r.route && String(e.service_type)===r.stype))
      .catch(err => { throw new Error(isFileProtocol ? 'FILE_PROTOCOL' : err.message); })
  ));

  let html = '';
  let anyErr = false;
  results.forEach((res,i) => {
    const r = BUS_ROUTES[i];
    const num = r.route;
    html += `<div class="route-block">
      <div class="route-header">
        <div class="kmb-badge">
          <div class="kmb-top">KMB</div>
          <div class="kmb-num">${num}</div>
          <div class="kmb-bot">BUS STOP</div>
        </div>
        <div class="route-text">
          <div class="route-dest">${r.dest}</div>
          <div class="route-stop">📍 ${r.stopName}</div>
        </div>
      </div>
      <div class="eta-rows">`;
    if (res.status!=='fulfilled' || !res.value.length) {
      anyErr = res.status!=='fulfilled';
      const errMsg = res.reason?.message==='FILE_PROTOCOL'
        ? '請用 HTTP server 開啟（Pi 上正常）'
        : res.status!=='fulfilled' ? '無法取得資料' : '暫無班次';
      html += `<div class="eta-row"><div class="no-eta">${errMsg}</div></div>`;
    } else {
      res.value.slice(0,2).forEach((e,idx) => {
        const eta = e.eta ? new Date(e.eta) : null;
        const diff = eta ? Math.round((eta-new Date())/60000) : null;
        const ts = eta ? eta.toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'}) : '';
        let minHtml = '';
        if (diff===null) minHtml=`<div class="eta-right"><div class="eta-min" style="font-size:12px;color:#b09070">-</div></div>`;
        else if (diff<=0) minHtml=`<div class="eta-right"><div class="eta-min arriving">即將到站</div><div class="eta-abs">${ts}</div></div>`;
        else minHtml=`<div class="eta-right"><div class="eta-min ${diff<=3?'soon':''}">${diff}<span class="eta-unit">分</span></div><div class="eta-abs">${ts}</div></div>`;
        const rmk=(e.rmk_tc&&e.rmk_tc!=='-')?e.rmk_tc:'';
        html+=`<div class="eta-row"><div class="eta-seq">${idx+1}</div><div class="eta-rmk">${rmk}</div>${minHtml}</div>`;
      });
    }
    html += `</div></div>`;
  });

  document.getElementById('busContent').innerHTML = html;
  document.getElementById('sDot').className = 's-dot'+(anyErr?' err':'');
  document.getElementById('sTxt').textContent = anyErr?'部分載入失敗':'已更新';
  icon.classList.remove('spin');

  busTimer = setInterval(()=>{
    busCountdown--;
    document.getElementById('sTxt').textContent=`${busCountdown}s 後更新`;
    if(busCountdown<=0){busCountdown=30;fetchBus();}
  },1000);
}

// Dinner
function toggleDinner(name, key) {
  if(!dinnerData[key]) dinnerData[key]={};
  const cur = dinnerData[key][name]??'yes';
  dinnerData[key][name] = cur==='yes'?'no':'yes';
  renderDinner();
}

function renderDinner() {
  const t = today0();
  const days = getWeekdays(weekOffset);
  ensureDefaults(days);
  const mon=days[0], fri=days[4];
  document.getElementById('weekLbl').textContent=`${fmt(mon)} – ${fmt(fri)}`;

  let html = '<table class="cal-table"><thead><tr>';
  html += '<th style="width:44px"></th>';
  days.forEach(d=>{
    const isT = dateKey(d)===dateKey(t);
    html+=`<th class="${isT?'today-h':''}">${WEEKDAY_ZH[d.getDay()]}<br><span style="font-size:10px;font-weight:400">${fmt(d)}</span></th>`;
  });
  html+='</tr></thead><tbody>';

  MEMBERS.forEach(m=>{
    html+='<tr>';
    html+=`<td class="avatar-cell"><div class="avatar-wrap"><img class="avatar-img" src="${m.avatar}" alt="${m.name}"></div></td>`;
    days.forEach(d=>{
      const k=dateKey(d);
      const isPast=d<t;
      const val=(dinnerData[k]||{})[m.name]??'yes';
      const cls=['tick-btn', val].join(' ');
      const icon=val==='yes'?'✓':'✗';
      const isT=dateKey(d)===dateKey(t);
      html+=`<td class="${isT?'today-td':''}"><button class="${cls}" onclick="toggleDinner('${m.name}','${k}')">${icon}</button></td>`;
    });
    html+='</tr>';
  });

  html+='</tbody></table>';

  let sum='<div class="summary-row">';
  days.forEach(d=>{
    const k=dateKey(d);
    const isT=dateKey(d)===dateKey(t);
    const count=MEMBERS.filter(m=>((dinnerData[k]||{})[m.name]??'yes')==='yes').length;
    const cls=['sum-chip',count>0?'has':'',isT?'today-chip':''].filter(Boolean).join(' ');
    sum+=`<div class="${cls}">${WEEKDAY_ZH[d.getDay()]} ${count>0?count+'人':'-'}</div>`;
  });
  sum+='</div>';

  document.getElementById('dinnerContent').innerHTML=html+sum;
}

function changeWeek(dir){
  const n=weekOffset+dir;
  if(n<-2||n>2)return;
  weekOffset=n;
  renderDinner();
}

// Init
updateClock(); setInterval(updateClock,1000);
fetchWeather(); setInterval(fetchWeather,10*60*1000);
fetchBus();
renderDinner();
</script>
</body>
</html>
